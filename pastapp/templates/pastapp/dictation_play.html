{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ dictation.title }} - Dictation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <style>
        :root {
            --color-bg: #121213;
            --color-surface: #1e1e1e;
            --color-text: #ffffff;
            --color-primary: #538d4e;
            /* green */
            --color-wrong: #3a3a3c;
            /* dark gray */
            --color-partial: #b59f3b;
            /* yellow */
            --color-empty: #818384;
            /* gray */
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px solid #3a3a3c;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .controls-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn-audio {
            background-color: var(--color-primary);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.2rem;
            border-radius: 8px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-audio:hover {
            background-color: #3a6836;
            color: white;
        }

        .dictation-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 15px;
            font-size: 1.2rem;
            line-height: 2.2;
        }

        .paragraph-container {
            margin-bottom: 30px;
            background-color: var(--color-surface);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #3a3a3c;
            display: none;
            /* Only show active paragraph */
        }

        .paragraph-container.active {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }

        .paragraph-container.completed {
            display: block;
            border-color: var(--color-primary);
            opacity: 0.9;
        }

        .word-wrapper {
            display: inline-block;
            margin: 0 2px;
            position: relative;
        }

        .punctuation {
            display: inline-block;
            margin-right: 4px;
        }

        .word-input {
            background-color: var(--color-wrong);
            border: 2px solid #565758;
            color: transparent;
            /* Text is invisible until correct, or maybe visible to let them see what they type */
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            padding: 2px 4px;
            outline: none;
            transition: all 0.2s;
        }

        /* When user types, show the text in white */
        .word-input:focus,
        .word-input.typing {
            color: white;
            border-color: #818384;
            background-color: #2a2a2a;
        }

        .word-input.correct {
            background-color: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
            pointer-events: none;
            /* cannot edit anymore */
            animation: bounceIn 0.5s;
        }

        .word-input.partial {
            background-color: var(--color-partial);
            border-color: var(--color-partial);
            color: white;
        }

        .word-input.incorrect {
            animation: shakeX 0.5s;
            border-color: #ff4d4d;
        }

        .progress-text {
            text-align: center;
            color: #a1a1aa;
            margin-bottom: 15px;
            font-weight: bold;
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.8);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        #success-message {
            display: none;
            text-align: center;
            margin-top: 30px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Dictation: {{ dictation.title }}</h1>
        <a href="{% url 'dictation_list' %}" class="btn btn-outline-light btn-sm">Go Back</a>
    </div>

    <div class="container">
        <div class="controls-container" id="controls">
            <button class="btn-audio" id="btn-play">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                    <path
                        d="M11.536 14.01A8.473 8.473 0 0 0 14.026 8a8.473 8.473 0 0 0-2.49-6.01l-.708.707A7.476 7.476 0 0 1 13.025 8c0 2.071-.84 3.946-2.197 5.303l.708.707z" />
                    <path
                        d="M10.121 12.596A6.48 6.48 0 0 0 12.025 8a6.48 6.48 0 0 0-1.904-4.596l-.707.707A5.483 5.483 0 0 1 11.025 8a5.483 5.483 0 0 1-1.61 3.89l.706.706z" />
                    <path
                        d="M8.707 11.182A4.486 4.486 0 0 0 10.025 8a4.486 4.486 0 0 0-1.318-3.182L8 5.525A3.489 3.489 0 0 1 9.025 8 3.49 3.49 0 0 1 8 10.475l.707.707zM6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06z" />
                </svg>
                Play Audio
            </button>
        </div>

        <div class="progress-text" id="progress-text">Sentence 1 of X</div>

        <div class="dictation-container" id="dictation-container">
            <!-- Paragraphs will be injected here by JS -->
        </div>

        <div id="success-message" class="animate__animated">
            <h2 class="text-success fw-bold mb-3">Excellent! 🎉</h2>
            <img src="{% static 'pastapp/img/win.png' %}" alt="win" style="width: 200px; height: 200px"
                onerror="this.style.display='none'">
            <div class="mt-4">
                <a href="{% url 'dictation_list' %}" class="btn btn-light">Return to Menu</a>
            </div>
        </div>
    </div>

    <!-- Pass text to JS safely -->
    {{ dictation.text|json_script:"dictation-text-data" }}

    <script src="{% static 'pastapp/js/dictation.js' %}"></script>
</body>

</html>
