{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dictation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --color-bg: #121213;
            --color-surface: #1e1e1e;
            --color-text: #ffffff;
            --color-primary: #538d4e;
            --color-hover: #3a6836;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #3a3a3c;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .card-custom {
            background-color: var(--color-surface);
            border: none;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: transform 0.2s;
            text-decoration: none;
            color: white;
            display: block;
            border: 1px solid #3a3a3c;
        }

        .card-custom:hover {
            transform: translateY(-2px);
            background-color: #2a2a2a;
            color: white;
            border-color: var(--color-primary);
        }

        .card-custom h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.2rem;
            color: var(--color-primary);
        }

        .card-custom p {
            margin: 0;
            color: #a1a1aa;
            font-size: 1.1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Dictation</h1>
        <a href="{% url 'index' %}" class="btn btn-outline-light btn-sm">Go Back</a>
    </div>

    <div class="container">
        <h2 class="mb-4 text-center">Choose a dictation to practice.</h2>

        <div class="row justify-content-center">
            <div class="col-md-8">
                {% for dictation in dictations %}
                <div class="card-custom" onclick="toggleCard({{ dictation.id }})" style="cursor: pointer;">
                    <h3>{{ dictation.title }}</h3>
                    <div id="content-{{ dictation.id }}"
                        style="display: none; margin-top: 15px; border-top: 1px solid #3a3a3c; padding-top: 15px;">
                        <p>{{ dictation.text }}</p>
                        <div class="text-center mt-3 d-flex justify-content-center gap-3">
                            <a href="{% url 'dictation_play' dictation.id %}" class="btn"
                                style="background-color: var(--color-primary); color: white; font-weight: bold; padding: 10px 20px; border-radius: 8px;"
                                onclick="event.stopPropagation()">Start</a>
                            <a href="{% url 'dictation_practice' dictation.id %}" class="btn btn-outline-light"
                                style="font-weight: bold; padding: 10px 20px; border-radius: 8px;"
                                onclick="event.stopPropagation()">Practice Words</a>
                        </div>
                    </div>
                </div>
                {% empty %}
                <div class="alert alert-info text-center">No dictations available.</div>
                {% endfor %}
            </div>
        </div>
    </div>

    <script>
        function toggleCard(id) {
            const content = document.getElementById('content-' + id);
            if (content.style.display === 'none') {
                content.style.display = 'block';
            } else {
                content.style.display = 'none';
            }
        }
    </script>
</body>

</html>
