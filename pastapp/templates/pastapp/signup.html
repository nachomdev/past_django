{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registrarse - Flexiones Tracker</title>
    <!-- Outfit Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'pastapp/css/auth.css' %}?v=2">
</head>

<body>
    <div class="auth-container">
        <!-- Header -->
        <div class="auth-header">
            <h1>Flexiones</h1>
            <p>Registra tu entrenamiento diario</p>
        </div>

        <!-- Form Card -->
        <form class="auth-card" method="POST" action="{% url 'flexiones_signup' %}">
            {% csrf_token %}
            
            <h2 style="font-size: 1.3rem; font-weight: 700; text-align: center; margin-bottom: 0.5rem;">Crear Cuenta</h2>
            
            {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
            {% endif %}

            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Nombre de usuario" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Mínimo 6 caracteres" required>
            </div>

            <div class="form-group">
                <label for="password_confirm">Confirmar Contraseña</label>
                <input type="password" id="password_confirm" name="password_confirm" class="form-input" placeholder="Repita su contraseña" required>
            </div>

            <button type="submit" class="submit-btn">Crear Cuenta</button>

            <div class="auth-footer">
                ¿Ya tienes una cuenta? 
                <a href="{% url 'flexiones_login' %}">Inicia sesión aquí</a>
            </div>
        </form>

        <div style="text-align: center;">
            <a href="{% url 'index' %}" class="back-home">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Volver al inicio
            </a>
        </div>
    </div>
</body>

</html>
